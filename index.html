<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clear Way Legal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .coming-soon {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #1b114b;
        flex-direction: column;
        padding: 20px;
      }
      .coming-soon {
        height: 100vh;
      }
      .logo-img img {
        width: 100%;
        height: auto;
      }
      .logo-img {
        max-width: 350px;
      }
      h1 {
        text-transform: uppercase;
        color: #fff;
        font-size: 52px;
        text-align: center;
      }
      .tagline {
        font-size: 28px;
        text-transform: uppercase;
        color: goldenrod;
        margin-bottom: 40px;
        text-align: center;
      }
      .pulse {
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.08);
        }
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
      }
      @media screen and (max-width: 991px) {
h1{
    font-size: 38px;
}
      }
      @media screen and (max-width: 767px) {
        h1 {
          font-size: 20px;
        }
        .tagline {
          font-size: 18px;
        }
        .logo-img {
          max-width: 180px;
        }
      }
    </style>
  </head>
  <body>
    <div class="coming-soon">
      <div class="logo-img">
        <img src="logo.jpg" alt="Image" />
      </div>
      <p class="tagline">Precision. Clarity. Results.</p>
      <h1 class="pulse">website under development</h1>
    </div>
  </body>
</html>
